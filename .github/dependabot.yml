# Dependabot keeps this repo's pinned dependencies up to date. It opens a PR
# (which you review) when a newer release exists.
#  - github-actions: the SHA-pinned actions in the reusable release workflows,
#    updating both the pinned SHA and its version comment.
#  - pip (templates/base, templates/extras): the canonical version pins a new
#    Simple X Tool copies at scaffold time, kept current here so new tools are
#    never born on stale pins.
#  - pip (templates/dev): the ruff/pytest tooling pins the reusable workflows
#    install for CI, and that tool repos copy as requirements-dev.txt so local
#    checks match CI.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /templates/base
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /templates/extras
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /templates/dev
    schedule:
      interval: weekly
