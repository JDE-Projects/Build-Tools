name: Release tarball (reusable)

# Source-distributed apps (Linux / Raspberry Pi, installed from source) call this.
# It packages the tagged source into a deterministic tar.gz on a clean GitHub
# runner, hashes it, attaches GitHub-signed provenance, and waits for your
# approval before publishing to the calling app's Releases page. There is no
# build step — the artifact is the source at the tag, not a compiled binary.
# Before packing it runs the same CI sanity checks as release.yml: ruff lint,
# an import of entry_script (if set), and pytest on tests/ (if present).

on:
  workflow_call:
    inputs:
      app_name:       { type: string, required: true }   # e.g. simple-network-dashboard
      python_version: { type: string, default: '3.11' }  # match the deployment target (Raspberry Pi OS Bookworm ships 3.11)
      entry_script:   { type: string, default: '' }      # app's main .py (e.g. main.py); enables the CI import check when set

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # required to sign provenance
      attestations: write       # required to record it
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with: { python-version: '${{ inputs.python_version }}' }
      - name: Get Build-Tools templates
        # Version-matches the dev tooling pins (ruff, pytest) to this workflow's
        # exact version. Use job.workflow_sha (github.job_workflow_sha is not a
        # real context and silently resolves to empty).
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: _buildtools
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -r _buildtools/templates/dev/requirements.txt
      - name: Lint (ruff)
        run: |
          # --exclude _buildtools: that folder is this workflow's own checkout,
          # not the caller's code. Linting it would fail a tool's release for a
          # problem in Build-Tools.
          ruff check . --select E4,E7,E9,F,B --exclude _buildtools
      - name: Import check
        if: ${{ inputs.entry_script != '' }}
        run: python -c "import $(basename '${{ inputs.entry_script }}' .py)"
      - name: Run tests
        run: |
          if [ -d tests ]; then
            python -m pytest tests -q
          else
            echo "No tests folder; skipping pytest."
          fi
      - name: Pack + hash
        id: pack
        run: |
          ver="${{ github.ref_name }}"
          name="${{ inputs.app_name }}"
          tar="${name}-${ver}.tar.gz"
          # Deterministic archive of tracked files at the tag, extracted under a
          # clean prefixed folder. HEAD is the tag commit checkout landed on.
          git archive --format=tar.gz --prefix="${name}-${ver}/" -o "$tar" HEAD
          # Full sha256sum output so users can verify with: sha256sum -c "$tar.sha256"
          sha256sum "$tar" > "$tar.sha256"
          echo "tar=$tar" >> "$GITHUB_OUTPUT"
      - name: Attest provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with: { subject-path: '${{ steps.pack.outputs.tar }}' }
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-files
          path: '${{ inputs.app_name }}-*'

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: release         # the human approval gate (set up per-app, once)
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: release-files }
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: '${{ inputs.app_name }}-*'
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}   # rc/beta tags never become "Latest"
