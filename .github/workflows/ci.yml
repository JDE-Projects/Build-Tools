name: CI (reusable)

# Every Simple X Tool calls this on pull requests and pushes to main. It runs
# the same sanity checks the release workflows run (ruff lint, an import of
# entry_script, pytest on tests/), so a bad dependency bump or a broken import
# fails on the PR instead of surfacing mid-release. There is no packing,
# signing, or publishing here: this workflow never writes anything.

on:
  workflow_call:
    inputs:
      python_version: { type: string, default: '3.11' }  # match the deployment target (Raspberry Pi OS Bookworm ships 3.11)
      entry_script:   { type: string, default: '' }      # app's main .py (e.g. main.py); enables the import check when set

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with: { python-version: '${{ inputs.python_version }}' }
      - name: Get Build-Tools templates
        # Version-matches the dev tooling pins (ruff, pytest) to this workflow's
        # exact version. Use job.workflow_sha (github.job_workflow_sha is not a
        # real context and silently resolves to empty).
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: _buildtools
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -r _buildtools/templates/dev/requirements.txt
      - name: Lint (ruff)
        run: |
          # --exclude _buildtools: that folder is this workflow's own checkout,
          # not the caller's code. Linting it would fail a tool's PR for a
          # problem in Build-Tools.
          ruff check . --select E4,E7,E9,F,B --exclude _buildtools
      - name: Import check
        if: ${{ inputs.entry_script != '' }}
        run: python -c "import $(basename '${{ inputs.entry_script }}' .py)"
      - name: Run tests
        run: |
          if [ -d tests ]; then
            python -m pytest tests -q
          else
            echo "No tests folder; skipping pytest."
          fi
