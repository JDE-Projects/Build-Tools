name: Build & Release (reusable)

# Apps call this. It builds the exe on a clean GitHub runner, zips it,
# hashes it, attaches GitHub-signed provenance, and waits for your
# approval before publishing to the calling app's Releases page.

on:
  workflow_call:
    inputs:
      app_name:        { type: string, required: true }   # e.g. SimpleProjectManager
      python_version:  { type: string, default: '3.14' }
      dist_subfolder:  { type: string, default: '' }       # blank = same as app_name
      build_command:   { type: string, default: 'Build.bat' }

jobs:
  build:
    runs-on: windows-latest
    permissions:
      id-token: write          # required to sign provenance
      attestations: write       # required to record it
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: { python-version: '${{ inputs.python_version }}' }
      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install pyinstaller
      - name: Build
        shell: cmd
        run: ${{ inputs.build_command }}
      - name: Pack + hash
        id: pack
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          $sub = if ("${{ inputs.dist_subfolder }}") { "${{ inputs.dist_subfolder }}" } else { "${{ inputs.app_name }}" }
          $zip = "${{ inputs.app_name }}-$ver.zip"
          Compress-Archive -Path "dist\$sub\*" -DestinationPath $zip
          (Get-FileHash $zip -Algorithm SHA256).Hash | Out-File "$zip.sha256"
          "zip=$zip" | Out-File $env:GITHUB_OUTPUT -Append
      - name: Attest provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with: { subject-path: '${{ steps.pack.outputs.zip }}' }
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-files
          path: '${{ inputs.app_name }}-*'

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: release         # the human approval gate (set up per-app, once)
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with: { name: release-files }
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: '${{ inputs.app_name }}-*'
          generate_release_notes: true
