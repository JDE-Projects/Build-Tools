name: Build & Release (reusable)

# Apps call this. It builds the exe on a clean GitHub runner, makes a Windows
# installer and a portable zip, hashes them, attaches GitHub-signed provenance
# over both, and waits for your approval before publishing to the calling app's
# Releases page.

on:
  workflow_call:
    inputs:
      app_name:        { type: string, required: true }   # e.g. SimpleProjectManager
      python_version:  { type: string, default: '3.14' }
      dist_subfolder:  { type: string, default: '' }       # blank = same as app_name
      build_command:   { type: string, default: 'Build.bat' }
      build_installer: { type: boolean, default: true }    # also build an Inno Setup installer
      app_id:          { type: string, default: '' }       # stable GUID for the installer's AppId (required when build_installer)

jobs:
  build:
    runs-on: windows-latest
    permissions:
      id-token: write          # required to sign provenance
      attestations: write       # required to record it
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: { python-version: '${{ inputs.python_version }}' }
      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install pyinstaller
      - name: Build
        shell: cmd
        run: ${{ inputs.build_command }}

      - name: Get installer template
        # Pin the template to this workflow's exact version. Use job.workflow_sha
        # (github.job_workflow_sha is not a real context and silently resolves to empty).
        if: ${{ inputs.build_installer }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: _buildtools
      - name: Install Inno Setup
        if: ${{ inputs.build_installer }}
        shell: pwsh
        run: choco install innosetup --version=6.7.1 --no-progress -y   # pin per supply-chain standard
      - name: Build installer
        id: installer
        if: ${{ inputs.build_installer }}
        shell: pwsh
        run: |
          $ver  = "${{ github.ref_name }}"
          $sub  = if ("${{ inputs.dist_subfolder }}") { "${{ inputs.dist_subfolder }}" } else { "${{ inputs.app_name }}" }
          $disp = $sub
          $exe  = "$sub.exe"
          $repo = "https://github.com/${{ github.repository }}"
          $out  = "${{ inputs.app_name }}-$ver-setup"

          # Build README.txt from the shared template + this app's usage.txt
          $tmpl  = Get-Content "_buildtools/installer/README.txt.template" -Raw
          $usage = if (Test-Path "installer/usage.txt") { (Get-Content "installer/usage.txt" -Raw).Trim() } else { "" }
          $readme = $tmpl.
            Replace("{{APP_NAME}}",   $disp).
            Replace("{{VERSION}}",    $ver).
            Replace("{{REPO_URL}}",   $repo).
            Replace("{{ISSUES_URL}}", "$repo/issues").
            Replace("{{USAGE}}",      $usage)
          Set-Content -Path "README.txt" -Value $readme -Encoding UTF8

          # Compile the installer
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc `
            "/DMySrcRoot=$env:GITHUB_WORKSPACE" `
            "/DMyAppName=$disp" `
            "/DMyAppVersion=$ver" `
            "/DMyExeName=$exe" `
            "/DMySourceDir=dist\$sub" `
            "/DMyAppId=${{ inputs.app_id }}" `
            "/DMyRepo=$repo" `
            "/DMyIssues=$repo/issues" `
            "/DMyOutput=$out" `
            "_buildtools/installer/installer.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

          $setup = "$out.exe"
          (Get-FileHash $setup -Algorithm SHA256).Hash | Out-File "$setup.sha256"
          "exe=$setup" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Pack + hash
        id: pack
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          $sub = if ("${{ inputs.dist_subfolder }}") { "${{ inputs.dist_subfolder }}" } else { "${{ inputs.app_name }}" }
          $zip = "${{ inputs.app_name }}-$ver.zip"
          Compress-Archive -Path "dist\$sub\*" -DestinationPath $zip
          (Get-FileHash $zip -Algorithm SHA256).Hash | Out-File "$zip.sha256"
          "zip=$zip" | Out-File $env:GITHUB_OUTPUT -Append
      - name: Attest provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            ${{ steps.pack.outputs.zip }}
            ${{ steps.installer.outputs.exe }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-files
          path: '${{ inputs.app_name }}-*'

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: release         # the human approval gate (set up per-app, once)
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: release-files }
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: '${{ inputs.app_name }}-*'
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}   # rc/beta tags never become "Latest"
